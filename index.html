<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Receive Robux</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: #f8f9fa;
      text-align: center;
    }
    .header {
      background: url('https://i.ibb.co/g9B7vkM/robux-banner.jpg') center/cover no-repeat;
      background-color: #1a1a1a;
      padding: 100px 20px 60px;
      color: white;
      font-size: 42px;
      font-weight: bold;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
    }
    .tool-container {
      background: #fff;
      max-width: 480px;
      margin: 30px auto;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    input[type=text] {
      width: 80%;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
    }
    .btn {
      padding: 10px 22px;
      background: black;
      color: white;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
    }
    .loading, .avatar-section, .success-popup {
      display: none;
      margin-top: 20px;
    }
    .loading img {
      width: 50px;
      height: 50px;
      filter: brightness(0) invert(1);
    }
    .robux-options {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 10px;
    }
    .robux-options button {
      padding: 14px;
      width: 45%;
      margin: 10px 5px;
      font-size: 16px;
      border: 2px solid #ccc;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background-color: #f9f9f9;
    }
    .robux-options button.selected {
      border-color: #28a745;
      background-color: #e6ffe6;
    }
    .robux-icon {
      width: 24px;
      height: 24px;
    }
    .success-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      z-index: 100;
      opacity: 1;
      transition: opacity 0.5s ease;
    }
    .success-popup.fade-out {
      opacity: 0;
    }
    /* Box style for details */
    .info-box {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 8px 12px;
      margin-top: 15px;
      text-align: left;
      font-size: 14px;
    }
    .info-line {
      border: 1px solid #ddd;
      padding: 6px 8px;
      border-radius: 6px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .status-success {
      color: #fff;
      background-color: #28a745;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
    .status-pending {
      color: #fff;
      background-color: #ff9800;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="header">Receive Robux</div>

  <div class="tool-container">
    <input type="text" id="username" placeholder="Enter your Roblox username"><br>
    <button class="btn" onclick="searchUser()">Search</button>

    <div class="loading" id="loadingSpinner">
      <img src="https://i.ibb.co/yXrSC0T/spinner-white.gif" alt="Loading">
    </div>

    <div class="avatar-section" id="avatarSection">
      <img id="avatarImg" src="" alt="Avatar" width="100" style="border-radius:50%;margin:20px 0;">
      <div id="displayName" style="font-size:20px;font-weight:bold;margin-bottom:10px;"></div>
      <p>Select Robux amount</p>
      <div class="robux-options">
        <button onclick="selectAmount(800)">
          <img class="robux-icon" src="https://i.ibb.co/7NJ5JC8/robux-icon.png" alt="Robux">800
        </button>
        <button onclick="selectAmount(1700)">
          <img class="robux-icon" src="https://i.ibb.co/7NJ5JC8/robux-icon.png" alt="Robux">1,700
        </button>
        <button onclick="selectAmount(4500)">
          <img class="robux-icon" src="https://i.ibb.co/7NJ5JC8/robux-icon.png" alt="Robux">4,500
        </button>
        <button onclick="selectAmount(10000)">
          <img class="robux-icon" src="https://i.ibb.co/7NJ5JC8/robux-icon.png" alt="Robux">10,000
        </button>
      </div>

      <button class="btn" id="confirmBtn" style="background:#28a745;margin-top:20px;display:none;" onclick="confirmOrder()">Confirm</button>
    </div>

    <div class="success-popup" id="successPopup">
      <p style="font-size:18px;font-weight:bold;">✅ Success!<br>Your order has been created.</p>

      <div class="info-box">
        <div class="info-line"><span>Đã done cho:</span> <span id="infoName"></span></div>
        <div class="info-line"><span>Hình thức:</span> <span>VND</span></div>
        <div class="info-line"><span>Bản Roblox:</span> <span>Roblox</span></div>
        <div class="info-line"><span>Số lượng:</span> <span id="infoAmount"></span></div>
        <div class="info-line"><span>Tình trạng đơn:</span> <span class="status-success">Thành công</span></div>
        <div class="info-line"><span>Trạng thái done:</span> <span class="status-pending">Chờ duyệt (1h - 72h)</span></div>
      </div>

      <button class="btn" onclick="closePopup()">Done</button>
    </div>
  </div>

  <script>
    let selectedAmount = 0;
    let currentUsername = "";
    async function searchUser() {
      const username = document.getElementById('username').value.trim();
      if (!username) return alert("Please enter a Roblox username");
      currentUsername = username;
      document.getElementById('loadingSpinner').style.display = 'block';
      document.getElementById('avatarSection').style.display = 'none';
      setTimeout(async () => {
        try {
          const res = await fetch("https://users.roproxy.com/v1/usernames/users", {
            method: 'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({usernames:[username]})
          });
          const data = await res.json();
          if (!data.data?.length) { alert("Username not found"); return; }
          const usr = data.data[0];
          const avatarUrl = (await fetch(`https://thumbnails.roproxy.com/v1/users/avatar-headshot?userIds=${usr.id}&size=150x150&format=Png&isCircular=false`)).json().then(j=>j.data[0].imageUrl);
          document.getElementById('displayName').innerText = `${usr.displayName} (@${username})`;
          document.getElementById('avatarImg').src = await avatarUrl;
          document.getElementById('avatarSection').style.display = 'block';
        } catch {
          alert("⚠️ Error loading data.");
        } finally { document.getElementById('loadingSpinner').style.display='none'; }
      },2000);
    }

    function selectAmount(amount) {
      selectedAmount = amount;
      document.querySelectorAll('.robux-options button').forEach(b=>b.classList.remove('selected'));
      event.currentTarget.classList.add('selected');
      document.getElementById('confirmBtn').style.display='inline-block';
    }

    function confirmOrder() {
      if (!selectedAmount) return alert("Please select a Robux amount");
      document.getElementById('loadingSpinner').style.display='block';
      setTimeout(()=>{
        document.getElementById('loadingSpinner').style.display='none';
        document.getElementById('successPopup').style.display='block';
        document.getElementById('infoName').innerText = currentUsername;
        document.getElementById('infoAmount').innerText = `${selectedAmount} Robux`;
      },2000);
    }

    function closePopup(){
      const popup = document.getElementById('successPopup');
      popup.classList.add('fade-out');
      setTimeout(()=>{ popup.style.display='none'; popup.classList.remove('fade-out'); },500);
    }
  </script>
</body>
</html>
