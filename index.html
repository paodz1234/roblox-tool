<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Receive Robux</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: #f8f9fa;
      text-align: center;
    }
    .header {
      background: url('LINK_ANH_NEN_CUA_BAN') center/cover no-repeat;
      padding: 100px 20px 60px;
      color: white;
      font-size: 42px;
      font-weight: bold;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
    }
    .tool-container {
      background: #fff;
      max-width: 480px;
      margin: 30px auto;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    input[type=text] {
      width: 80%;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
    }
    .btn {
      padding: 10px 22px;
      background: black;
      color: white;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
    }
    .loading, .avatar-section, .success-popup {
      display: none;
      margin-top: 20px;
    }
    .loading img {
      width: 50px;
      height: 50px;
      filter: brightness(0) invert(1);
    }
    .robux-options {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
    .robux-options button {
      padding: 14px;
      width: 45%;
      margin: 10px 5px;
      font-size: 16px;
      border: 2px solid #ccc;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background-color: #f9f9f9;
    }
    .robux-options button.selected {
      border-color: #28a745;
      background-color: #e6ffe6;
    }
    .robux-icon {
      width: 24px;
      height: 24px;
    }
    .success-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      z-index: 100;
      animation: fadeIn 0.4s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -45%); }
      to { opacity: 1; transform: translate(-50%, -50%); }
    }
    .order-info {
      border: 1px solid #ccc;
      border-radius: 8px;
      text-align: left;
      margin: 15px 0;
    }
    .order-info div {
      padding: 8px 12px;
      border-bottom: 1px solid #ccc;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .order-info div:last-child {
      border-bottom: none;
    }
    .status-success {
      background-color: #28a745;
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: bold;
    }
    .status-pending {
      background-color: orange;
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="header">Receive Robux</div>

  <div class="tool-container">
    <input type="text" id="username" placeholder="Enter your Roblox username"><br>
    <button class="btn" onclick="searchUser()">Search</button>

    <div class="loading" id="loadingSpinner">
      <img src="https://i.ibb.co/yXrSC0T/spinner-white.gif" alt="Loading">
    </div>

    <div class="avatar-section" id="avatarSection">
      <img id="avatarImg" src="" alt="Avatar" width="100" style="border-radius:50%;margin:20px 0;">
      <div id="displayName" style="font-size:20px;font-weight:bold;"></div>
      <p>Select Robux amount</p>
      <div class="robux-options">
        <button onclick="selectAmount(800)"><img class="robux-icon" src="https://i.ibb.co/7NJ5JC8/robux-icon.png">800</button>
        <button onclick="selectAmount(1700)"><img class="robux-icon" src="https://i.ibb.co/7NJ5JC8/robux-icon.png">1,700</button>
        <button onclick="selectAmount(4500)"><img class="robux-icon" src="https://i.ibb.co/7NJ5JC8/robux-icon.png">4,500</button>
        <button onclick="selectAmount(10000)"><img class="robux-icon" src="https://i.ibb.co/7NJ5JC8/robux-icon.png">10,000</button>
      </div>
      <button class="btn" id="confirmBtn" style="background:#28a745;margin-top:20px;display:none;" onclick="confirmOrder()">Confirm</button>
    </div>

    <div class="success-popup" id="successPopup">
      <h3>✅ Đã done cho: <span id="popupName"></span></h3>
      <div class="order-info">
        <div><span>Hình thức:</span><span>VND</span></div>
        <div><span>Bản Roblox:</span><span>Roblox</span></div>
        <div><span>Số lượng:</span><span id="popupAmount"></span></div>
        <div><span>Tình trạng đơn:</span><span class="status-success">Thành công</span></div>
        <div><span>Tình trạng done:</span><span class="status-pending">Chờ duyệt (1h - 72h)</span></div>
        <div><span>Ngày tạo:</span><span id="popupDate"></span></div>
      </div>
      <button class="btn" onclick="closePopup()">Done</button>
    </div>
  </div>

  <script>
    let selectedAmount = 0, currentName = "";

    async function searchUser() {
      const username = document.getElementById('username').value.trim();
      if (!username) return alert("Please enter a Roblox username");
      document.getElementById('loadingSpinner').style.display = 'block';
      document.getElementById('avatarSection').style.display = 'none';
      setTimeout(async () => {
        try {
          const res = await fetch("https://users.roproxy.com/v1/usernames/users", {
            method: 'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({usernames:[username]})
          });
          const data = await res.json();
          if (!data.data?.length) { alert("Username not found"); return; }
          const usr = data.data[0];
          currentName = `${usr.displayName} (@${username})`;
          const avatarUrl = (await fetch(`https://thumbnails.roproxy.com/v1/users/avatar-headshot?userIds=${usr.id}&size=150x150&format=Png&isCircular=false`))
            .json().then(j=>j.data[0].imageUrl);
          document.getElementById('displayName').innerText = currentName;
          document.getElementById('avatarImg').src = await avatarUrl;
          document.getElementById('avatarSection').style.display = 'block';
        } catch {
          alert("⚠️ Error loading data.");
        } finally {
          document.getElementById('loadingSpinner').style.display='none';
        }
      },2000);
    }

    function selectAmount(amount) {
      selectedAmount = amount;
      document.querySelectorAll('.robux-options button').forEach(b=>b.classList.remove('selected'));
      event.currentTarget.classList.add('selected');
      document.getElementById('confirmBtn').style.display='inline-block';
    }

    function confirmOrder() {
      if (!selectedAmount) return alert("Please select a Robux amount");
      document.getElementById('loadingSpinner').style.display='block';
      setTimeout(()=>{
        document.getElementById('loadingSpinner').style.display='none';
        document.getElementById('popupName').innerText = currentName;
        document.getElementById('popupAmount').innerText = selectedAmount + " Robux";
        document.getElementById('popupDate').innerText = new Date().toLocaleString("vi-VN");
        document.getElementById('successPopup').style.display='block';
      },2000);
    }

    function closePopup(){
      document.getElementById('successPopup').style.animation = "fadeOut 0.4s ease-in-out forwards";
      setTimeout(()=>{ document.getElementById('successPopup').style.display='none'; }, 400);
    }

    @keyframes fadeOut {
      from { opacity: 1; transform: translate(-50%, -50%); }
      to { opacity: 0; transform: translate(-50%, -45%); }
    }
  </script>
</body>
</html>
