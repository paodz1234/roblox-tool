<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Receive Robux</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background: #f8f9fa;
      text-align: center;
    }
    .header {
      background: url('https://i.ibb.co/GQ4F1LfW/fb033297-d245-4f86-b70d-f515a702ee69-1.jpg') center/cover no-repeat;
      padding: 100px 20px 60px;
      color: white;
      font-size: 42px;
      font-weight: bold;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
    }
    .tool-container {
      background: #fff;
      max-width: 480px;
      margin: 30px auto;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }
    input {
      width: 80%;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
    }
    .btn {
      padding: 10px 22px;
      background: black;
      color: white;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      font-family: 'Poppins', sans-serif;
    }
    .loading-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(255,255,255,0.85);
      z-index: 200;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .loading-spinner {
      border: 8px solid #f3f3f3;
      border-top: 8px solid #28a745;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin-bottom: 10px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-overlay p {
      font-size: 24px;
      font-weight: bold;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }
    .robux-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      justify-items: center;
      margin-top: 10px;
    }
    .robux-options button {
      padding: 12px;
      width: 100%;
      font-size: 16px;
      border: 2px solid #ccc;
      border-radius: 10px;
      cursor: pointer;
      background-color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .robux-options button.selected {
      border-color: #28a745;
    }
    .robux-options button img {
      width: 20px;
      height: 20px;
    }
    .robux-input {
      width: 60%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      margin-bottom: 20px;
      font-family: 'Poppins', sans-serif;
    }
    .radio-group {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .radio-group label {
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .success-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      z-index: 300;
    }
    .avatar-section {
      display: none;
    }
    /* Trang thông tin đơn hàng */
    .order-details {
      display: none;
      opacity: 0;
      transition: opacity 0.6s ease;
      max-width: 480px;
      margin: 30px auto;
      padding: 20px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: left;
      font-size: 15px;
      line-height: 1.6;
    }
    .order-details.show {
      display: block;
      opacity: 1;
    }
    .back-link {
      display: inline-block;
      margin-top: 15px;
      color: #007bff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header">Receive Robux</div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <p>Loading<span class="dots">...</span></p>
  </div>

  <div class="tool-container" id="mainTool">
    <input type="text" id="username" placeholder="Enter your Roblox username">
    <br>
    <button class="btn" onclick="onSearch()">Search</button>

    <div class="avatar-section" id="avatarSection">
      <img id="avatarImg" src="" alt="Avatar" width="100" style="border-radius: 50%; margin: 20px 0;">
      <div id="displayName" style="font-size: 20px; font-weight: bold;"></div>

      <p>Enter Robux amount</p>
      <div class="radio-group">
        <label><input type="radio" name="robloxType" value="roblox" checked> Roblox</label>
        <label><input type="radio" name="robloxType" value="vng"> Roblox VNG</label>
      </div>

      <input class="robux-input" type="number" id="robuxAmount" placeholder="Enter Robux"/>

      <p>Or select a predefined amount:</p>
      <div class="robux-options">
        <button onclick="setRobux(800, this)"><img src="https://i.ibb.co/mCJ8DPSy/9b9a5661-e23a-4e7c-94ad-836392bf8995-1.jpg" alt="icon">800</button>
        <button onclick="setRobux(1700, this)"><img src="https://i.ibb.co/mCJ8DPSy/9b9a5661-e23a-4e7c-94ad-836392bf8995-1.jpg" alt="icon">1,700</button>
        <button onclick="setRobux(4500, this)"><img src="https://i.ibb.co/mCJ8DPSy/9b9a5661-e23a-4e7c-94ad-836392bf8995-1.jpg" alt="icon">4,500</button>
        <button onclick="setRobux(10000, this)"><img src="https://i.ibb.co/mCJ8DPSy/9b9a5661-e23a-4e7c-94ad-836392bf8995-1.jpg" alt="icon">10,000</button>
      </div>

      <button class="btn" id="confirmBtn" style="background: #28a745; margin-top: 20px;" onclick="onConfirm()">Confirm</button>
    </div>
  </div>

  <div class="success-popup" id="successPopup" style="display:none">
    <p style="font-size: 18px; font-weight: bold;">✅ Success!<br>Your order has been created.</p>
    <button class="btn" onclick="closePopup()">Done</button>
  </div>

  <div class="order-details" id="orderDetails">
    <p><strong>Avatar:</strong> <span id="odAvatarName"></span></p>
    <p><strong>Đã done cho:</strong> <span id="odDoneFor"></span></p>
    <p><strong>Hình thức:</strong> VND</p>
    <p><strong>Bản Roblox:</strong> <span id="odVersion"></span></p>
    <p><strong>Số lượng:</strong> <span id="odAmount"></span> Robux</p>
    <p><strong>Tình trạng đơn:</strong> Thành công</p>
    <p><strong>Tình trạng done:</strong> Chờ duyệt (1h - 72h)</p>
    <span class="back-link" onclick="goBack()">⟵ Quay lại</span>
  </div>

  <script>
    let savedName = "";
    let savedUsername = "";
    let savedVersion = "";
    let savedAmount = "";

    function toggleLoading(show) {
      document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
    }

    async function onSearch() {
      const username = document.getElementById('username').value.trim();
      if (!username) return alert("Please enter a Roblox username");

      toggleLoading(true);
      document.getElementById('avatarSection').style.display = 'none';

      setTimeout(async () => {
        try {
          const resp = await fetch("https://users.roproxy.com/v1/usernames/users", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ usernames: [username] })
          });
          const data = await resp.json();
          if (!data.data?.length) {
            alert("Username not found");
            toggleLoading(false);
            return;
          }
          const user = data.data[0];
          const avatarResp = await fetch(`https://thumbnails.roproxy.com/v1/users/avatar-headshot?userIds=${user.id}&size=150x150&format=Png&isCircular=false`);
          const avatarData = await avatarResp.json();

          savedName = user.displayName;
          savedUsername = username;

          document.getElementById('displayName').innerText = `${user.displayName} (@${username})`;
          document.getElementById('avatarImg').src = avatarData.data[0].imageUrl;
          document.getElementById('avatarSection').style.display = 'block';
        } catch {
          alert('⚠️ Error loading data.');
        } finally {
          toggleLoading(false);
        }
      }, 2000);
    }

    function onConfirm() {
      const amount = document.getElementById('robuxAmount').value;
      const version = document.querySelector('input[name="robloxType"]:checked').value;
      if (!amount || isNaN(amount)) return alert("Please enter a valid Robux amount");

      savedVersion = version === "roblox" ? "Roblox" : "Roblox VNG";
      savedAmount = amount;

      toggleLoading(true);
      setTimeout(() => {
        toggleLoading(false);
        document.getElementById('successPopup').style.display = 'block';
      }, 2000);
    }

    function setRobux(amount, btn) {
      document.getElementById('robuxAmount').value = amount;
      document.querySelectorAll('.robux-options button').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    }

    function closePopup() {
      document.getElementById('successPopup').style.display = 'none';
      // Cập nhật thông tin đơn hàng
      document.getElementById('odAvatarName').innerText = `${savedName} (@${savedUsername})`;
      document.getElementById('odDoneFor').innerText = `${savedName} (@${savedUsername})`;
      document.getElementById('odVersion').innerText = savedVersion;
      document.getElementById('odAmount').innerText = savedAmount;
      // Hiện trang chi tiết đơn hàng với hiệu ứng
      setTimeout(() => {
        document.getElementById('mainTool').style.display = 'none';
        document.getElementById('orderDetails').classList.add('show');
      }, 100);
    }

    function goBack() {
      document.getElementById('orderDetails').classList.remove('show');
      setTimeout(() => {
        document.getElementById('mainTool').style.display = 'block';
      }, 300);
    }
  </script>
</body>
</html>
